<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordPro Encoder</title>
<link rel="stylesheet" href="shared.css">
<style>
  .container {
    width: 100%;
    max-width: 40rem;
  }

  textarea {
    width: 100%;
    min-height: 12rem;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    background: var(--surface);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    line-height: 1.5;
    resize: vertical;
    margin-bottom: 0.75rem;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .btn { width: 100%; }

  #result {
    display: none;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    word-break: break-all;
    line-height: 1.5;
    user-select: all;
  }
</style>
</head>
<body>

<h1>ChordPro Encoder</h1>
<div class="container">
  <textarea id="input" placeholder="Paste ChordPro text here..."></textarea>
  <div class="actions">
    <button class="btn btn-primary" id="encode-btn">Encode</button>
    <button class="btn" id="copy-btn" style="display:none">Copy URL</button>
  </div>
  <div id="result"></div>
</div>

<script>
const input = document.getElementById('input');
const result = document.getElementById('result');
const encodeBtn = document.getElementById('encode-btn');
const copyBtn = document.getElementById('copy-btn');

function encodeChoPro(text) {
  return btoa(unescape(encodeURIComponent(text)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

encodeBtn.addEventListener('click', () => {
  const text = input.value.trim();
  if (!text) return;

  const encoded = encodeChoPro(text);
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  const url = base + 'sheet.html?data=' + encoded;

  result.textContent = url;
  result.style.display = 'block';
  copyBtn.style.display = '';
});

copyBtn.addEventListener('click', () => {
  const text = result.textContent;
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);

  const original = copyBtn.textContent;
  copyBtn.textContent = 'Copied!';
  setTimeout(() => { copyBtn.textContent = original; }, 1500);
});
</script>

</body>
</html>
