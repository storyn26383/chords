<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Sheet</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/tonal@6.2.0/browser/tonal.min.js"></script>
<script src="chord-db.js"></script>
<script src="ui.js"></script>
<script src="https://pianosnake.github.io/uke-chord/uke-chord.js"></script>
<style>
  .title-group {
    min-width: 0;
    overflow: hidden;
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  #viewer {
    width: 100%;
    max-width: 40rem;
    line-height: 1.6;
    overflow-x: auto;
  }

  #viewer .row {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 0.5em;
  }

  #viewer .row:last-child {
    margin-bottom: 0;
  }

  #viewer .chord + .lyrics:not(:empty) {
    margin-top: -0.25em;
  }

  #viewer .chord {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.85em;
  }

  #viewer .chord.spaced {
    margin-right: 0.5em;
  }

  #viewer .chord:after,
  #viewer .lyrics:after {
    content: '\200b';
  }

  #viewer h1.title {
    display: none;
  }

  #viewer .comment,
  #viewer .label {
    font-size: 1.25em;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #viewer .paragraph {
    margin-bottom: 1em;
  }

  #viewer .paragraph:last-child {
    margin-bottom: 0;
  }

  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    background: var(--bg);
    z-index: 10;
  }

  .top-bar h1 {
    margin-bottom: 0;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .transpose-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
  }

  .key-select {
    padding: 0.3rem 1.5rem 0.3rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                      linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
    background-position: calc(100% - 0.75rem) center, calc(100% - 0.5rem) center;
    background-size: 0.25rem 0.25rem, 0.25rem 0.25rem;
    background-repeat: no-repeat;
  }

  .key-select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .capo-display {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .font-size-controls {
    display: flex;
    gap: 0.375rem;
    flex-shrink: 0;
  }

  .font-size-controls button {
    width: 2rem;
    height: 2rem;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .font-size-controls button:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
  }

  .placeholder {
    color: var(--text-muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
  }

  .chord-panel {
    width: 100%;
    max-width: 40rem;
    margin-bottom: 1rem;
  }

  .chord-panel-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.85rem;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    list-style: none;
  }

  .chord-panel-summary::-webkit-details-marker { display: none; }

  .chord-panel-summary-label::before {
    content: '▸';
    font-size: 0.7rem;
    margin-right: 0.375rem;
    display: inline-block;
    transition: transform 0.15s;
  }

  .chord-panel[open] .chord-panel-summary-label::before {
    transform: rotate(90deg);
  }

  #chord-diagrams {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0.75rem 0 0;
  }

  .chord-card {
    background: var(--card-bg);
    color: var(--card-text);
    border-radius: 0.375rem;
    padding: 0.5rem 0.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 0.125rem 0.5rem var(--card-shadow);
  }

  .chord-card-name {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chordsheetjs@14.3.1/lib/bundle.min.js"></script>
</head>
<body>

<div class="top-bar">
  <div class="title-group">
    <h1 id="song-title">Chord Sheet</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div class="controls-row">
    <div class="transpose-controls">
      <select class="key-select" id="key-select" disabled></select>
      <span class="capo-display" id="capo-display"></span>
    </div>
    <div class="font-size-controls">
      <button id="font-decrease">&minus;</button>
      <button id="font-increase">+</button>
    </div>
  </div>
</div>
<details class="chord-panel" id="chord-panel">
  <summary class="chord-panel-summary">
    <span class="chord-panel-summary-label">Chords</span>
  </summary>
  <div id="chord-diagrams"></div>
</details>
<div id="viewer"></div>

<script>
const viewer = document.getElementById('viewer');
const titleEl = document.getElementById('song-title');
const subtitleEl = document.getElementById('subtitle');
const keySelect = document.getElementById('key-select');
const capoDisplay = document.getElementById('capo-display');

const ROOTS = [
  'C', 'C#', 'Db', 'D', 'D#', 'Eb', 'E', 'F',
  'F#', 'Gb', 'G', 'G#', 'Ab', 'A', 'A#', 'Bb', 'B',
];

let originalSong = null;
let originalRoot = null;
let keySuffix = '';

function decodeBase64UTF8(b64) {
  const standard = b64.replace(/-/g, '+').replace(/_/g, '/');
  return decodeURIComponent(escape(atob(standard)));
}

function parseKey(key) {
  if (!key) return null;
  const match = key.match(/^([A-G][#b]?)(.*)$/);
  if (!match) return null;
  return { root: match[1], suffix: match[2] || '' };
}

function findFallbackRoot(choProText) {
  const match = choProText.match(/\[([A-G][#b]?)[^\]]*\]/);
  return match ? match[1] : null;
}

function renderSong(song) {
  const formatter = new ChordSheetJS.HtmlDivFormatter();
  viewer.innerHTML = formatter.format(song);

  viewer.querySelectorAll('.column').forEach(col => {
    const chord = col.querySelector('.chord');
    if (!chord || !chord.textContent.trim()) return;
    const nextCol = col.nextElementSibling;
    if (nextCol && nextCol.querySelector('.chord')?.textContent.trim()) {
      chord.classList.add('spaced');
    }
  });

  viewer.querySelectorAll('.row').forEach(row => {
    const chords = row.querySelectorAll('.chord');
    const lyrics = row.querySelectorAll('.lyrics');
    if (chords.length && ![...chords].some(el => el.textContent.trim())) {
      chords.forEach(el => el.remove());
    }
    if (lyrics.length && ![...lyrics].some(el => el.textContent.trim())) {
      lyrics.forEach(el => el.remove());
    }
  });

  viewer.querySelectorAll('.row').forEach(row => {
    if (row.querySelector('.label, .comment')) return;
    const hasContent = [...row.querySelectorAll('.chord, .lyrics')].some(el => el.textContent.trim());
    if (!hasContent) row.remove();
  });

  currentChords = song.getChords().slice().sort((a, b) => {
    const pa = parseChordName(a);
    const pb = parseChordName(b);
    const ia = pa ? ChordDb.NOTE_TO_INDEX[pa.root] ?? 999 : 999;
    const ib = pb ? ChordDb.NOTE_TO_INDEX[pb.root] ?? 999 : 999;
    if (ia !== ib) return ia - ib;
    const sa = pa ? ChordDb.CHORD_TYPE_PRIORITY[pa.suffix] ?? 999 : 999;
    const sb = pb ? ChordDb.CHORD_TYPE_PRIORITY[pb.suffix] ?? 999 : 999;
    if (sa !== sb) return sa - sb;
    return a.localeCompare(b);
  });
  renderChordPanel();
}

const UKE_STORAGE = 'uke-chord-state';
const chordDiagrams = document.getElementById('chord-diagrams');

let currentInstrument = getStoredInstrument();
let CHORDS_MAP = {};
let currentChords = [];

function getStoredInstrument() {
  try {
    const state = JSON.parse(localStorage.getItem(UKE_STORAGE)) || {};
    return state.instrument === 'guitar' ? 'guitar' : 'ukulele';
  } catch { return 'ukulele'; }
}

function saveInstrument(inst) {
  let state = {};
  try { state = JSON.parse(localStorage.getItem(UKE_STORAGE)) || {}; } catch {}
  state.instrument = inst;
  localStorage.setItem(UKE_STORAGE, JSON.stringify(state));
}

function parseChordName(name) {
  const match = /^([A-G][#b]?)([^\/]*)/.exec(name);
  if (!match) return null;
  let suffix = match[2];
  if (suffix === '') suffix = 'major';
  else if (suffix === 'm' || suffix === 'min') suffix = 'minor';
  return { root: match[1], suffix };
}

function renderChordPanel() {
  chordDiagrams.innerHTML = '';
  currentChords.forEach(name => {
    const parsed = parseChordName(name);
    if (!parsed) return;
    const data = CHORDS_MAP[parsed.root + parsed.suffix];
    if (!data) return;
    const sub = ChordDb.spellSub(name, data);
    const card = document.createElement('div');
    card.className = 'chord-card';
    card.innerHTML =
      `<div class="chord-card-name">${name}</div>` +
      `<uke-chord frets="${data.frets}" fingers="${data.fingers}" sub="${sub}" position="${data.position || 0}"></uke-chord>`;
    chordDiagrams.appendChild(card);
  });
}

async function loadChordDb() {
  const db = await ChordDb.fetchDb(currentInstrument);
  CHORDS_MAP = ChordDb.buildChordMap(db, currentInstrument);
}

function setupChordPanel() {
  const summary = document.querySelector('.chord-panel-summary');
  const guitarSwitch = Ui.createSwitch('Guitar', currentInstrument === 'guitar', async (val) => {
    currentInstrument = val ? 'guitar' : 'ukulele';
    saveInstrument(currentInstrument);
    await loadChordDb();
    renderChordPanel();
  });
  guitarSwitch.addEventListener('click', (e) => e.stopPropagation());
  summary.appendChild(guitarSwitch);
}

function updateCapo(currentRoot) {
  const origIdx = ChordDb.NOTE_TO_INDEX[originalRoot];
  const curIdx = ChordDb.NOTE_TO_INDEX[currentRoot];
  const capo = ((origIdx - curIdx) + 12) % 12;
  capoDisplay.textContent = `Capo: ${capo}`;
}

function setupKeyControls(choProText) {
  const parsedKey =
    parseKey(originalSong.key) ||
    parseKey(originalSong.metadata?.key) ||
    parseKey(findFallbackRoot(choProText));

  if (!parsedKey || ChordDb.NOTE_TO_INDEX[parsedKey.root] === undefined) {
    keySelect.disabled = true;
    capoDisplay.style.display = 'none';
    return;
  }

  originalRoot = parsedKey.root;
  keySuffix = parsedKey.suffix;

  keySelect.innerHTML = '';
  ROOTS.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r + keySuffix;
    if (r === originalRoot) {
      opt.selected = true;
    }
    keySelect.appendChild(opt);
  });
  keySelect.disabled = false;

  updateCapo(originalRoot);

  keySelect.addEventListener('change', () => {
    const newRoot = keySelect.value;
    const newKey = newRoot + keySuffix;
    const transposed = originalSong.changeKey(newKey);
    renderSong(transposed);
    updateCapo(newRoot);
  });
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const data = params.get('data');

  if (!data) {
    viewer.innerHTML = '<div class="placeholder">No chord sheet data provided.</div>';
    return;
  }

  let decoded;
  try {
    decoded = decodeBase64UTF8(data);
  } catch {
    viewer.innerHTML = '<div class="placeholder">Failed to decode chord sheet data.</div>';
    return;
  }

  const parser = new ChordSheetJS.ChordProParser();
  originalSong = parser.parse(decoded);

  const title = originalSong.metadata.title;
  const subtitle = originalSong.metadata.subtitle || originalSong.metadata.artist;

  if (title) {
    titleEl.textContent = title;
    document.title = title;
  }
  if (subtitle) {
    subtitleEl.textContent = subtitle;
  } else {
    subtitleEl.style.display = 'none';
  }

  setupKeyControls(decoded);
  renderSong(originalSong);
}

const topBar = document.querySelector('.top-bar');
function syncTopBarPadding() {
  document.body.style.paddingTop = topBar.offsetHeight + 'px';
}
syncTopBarPadding();
new ResizeObserver(syncTopBarPadding).observe(topBar);

setupChordPanel();
render();
loadChordDb().then(renderChordPanel);

const FONT_STEP = 1;
const FONT_MIN = 10;
const FONT_MAX = 28;
let fontSize = parseInt(localStorage.getItem('sheet-font-size')) || 16;

function applyFontSize() {
  viewer.style.fontSize = fontSize + 'px';
  localStorage.setItem('sheet-font-size', fontSize);
}

applyFontSize();

document.getElementById('font-decrease').addEventListener('click', () => {
  if (fontSize > FONT_MIN) { fontSize -= FONT_STEP; applyFontSize(); }
});

document.getElementById('font-increase').addEventListener('click', () => {
  if (fontSize < FONT_MAX) { fontSize += FONT_STEP; applyFontSize(); }
});
</script>

</body>
</html>
