<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukulele Chord Finder</title>
<script src="https://cdn.jsdelivr.net/npm/tonal@6.2.0/browser/tonal.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
<script src="https://pianosnake.github.io/uke-chord/uke-chord.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1.8rem;
    letter-spacing: 0.02em;
  }

  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 0.5rem;
    width: 100%;
    max-width: 20rem;
  }

  .root-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.375rem;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 20rem;
  }

  .category {
    width: 100%;
    max-width: 20rem;
    margin-bottom: 0.6rem;
  }

  .category-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 0.35rem;
    padding-left: 0.125rem;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.3125rem;
  }

  .btn {
    padding: 0.55rem 0;
    border: 1px solid #333;
    border-radius: 0.375rem;
    background: #16213e;
    color: #ccc;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover { background: #1a2a50; border-color: #555; }

  .btn.active {
    background: #e94560;
    border-color: #e94560;
    color: #fff;
    font-weight: 600;
  }

  #quality-section {
    width: 100%;
    max-width: 20rem;
    margin-bottom: 1.8rem;
  }

  #chord-display {
    margin-top: 0.5rem;
    background: #fff;
    border-radius: 0.75rem;
    padding: 1.5rem 2rem;
    width: 100%;
    max-width: 20rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0.25rem 1.5rem rgba(0,0,0,0.3);
  }

  .chord-name {
    font-size: 1.1rem;
    font-weight: 500;
    color: #000;
    margin-bottom: 0.5rem;
  }

  #chord-display .placeholder {
    color: #aaa;
    font-size: 0.85rem;
  }

  #score-section {
    margin-top: 1.2rem;
    width: 100%;
    max-width: 20rem;
    text-align: center;
    background: #fff;
    color: #000;
    border-radius: 0.625rem;
    padding: 1.5rem 2rem;
    box-shadow: 0 0.25rem 1.5rem rgba(0,0,0,0.3);
    overflow: hidden;
    display: flex;
    justify-content: center;
  }


  .switches {
    width: 100%;
    max-width: 20rem;
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .switch-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .switch-item span {
    font-size: 0.75rem;
    color: #888;
  }

  .switch-track {
    width: 2rem;
    height: 1.125rem;
    border-radius: 0.5625rem;
    background: #333;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .switch-track::after {
    content: '';
    position: absolute;
    top: 0.125rem;
    left: 0.125rem;
    width: 0.875rem;
    height: 0.875rem;
    border-radius: 50%;
    background: #888;
    transition: transform 0.2s, background 0.2s;
  }

  .switch-item.active .switch-track {
    background: #e94560;
  }

  .switch-item.active .switch-track::after {
    transform: translateX(0.875rem);
    background: #fff;
  }

  @media (max-width: 360px) {
    .root-grid, #quality-section, .section-label, #score-section { max-width: 17.5rem; }
    .category-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<h1>Ukulele / Guitar Chords</h1>

<div class="section-label">Root</div>
<div class="root-grid" id="root-grid"></div>

<div class="section-label">Quality</div>
<div id="quality-section"></div>

<div class="switches" id="switches"></div>

<div id="chord-display"></div>

<div id="score-section"></div>

<script>
const CDN_URLS = {
  ukulele: 'https://cdn.jsdelivr.net/npm/@tombatossals/chords-db/lib/ukulele.json',
  guitar: 'https://cdn.jsdelivr.net/npm/@tombatossals/chords-db/lib/guitar.json',
};
const GUITAR_KEY_MAP = { 'Db': 'Csharp', 'Gb': 'Fsharp' };
let currentInstrument = 'ukulele';
const dbCache = {};

const NOTES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

const ROOTS = [
  { name: 'C',  common: true },
  { name: 'Db', label: 'C#/Db' },
  { name: 'D',  common: true },
  { name: 'Eb', label: 'D#/Eb' },
  { name: 'E',  common: true },
  { name: 'F',  common: true },
  { name: 'Gb', label: 'F#/Gb' },
  { name: 'G',  common: true },
  { name: 'Ab', label: 'G#/Ab' },
  { name: 'A',  common: true },
  { name: 'Bb', label: 'A#/Bb' },
  { name: 'B' },
];

const CATEGORIES = [
  { name: 'Third',     items: [
    { id: 'major', label: 'Maj',   common: true },
    { id: 'minor', label: 'm',     common: true },
    { id: 'aug',   label: 'aug' },
    { id: 'dim',   label: 'dim' },
  ]},
  { name: 'Seventh',   items: [
    { id: '7',     label: '7',     common: true },
    { id: 'maj7',  label: 'maj7',  common: true },
    { id: 'm7',    label: 'm7',    common: true },
    { id: 'mmaj7', label: 'mMaj7' },
    { id: 'm7b5',  label: 'm7b5' },
    { id: 'aug7',  label: 'aug7' },
    { id: 'dim7',  label: 'dim7' },
  ]},
  { name: 'Suspended', items: [
    { id: 'sus2',  label: 'sus2' },
    { id: 'sus4',  label: 'sus4' },
    { id: '7sus4', label: '7sus4' },
  ]},
  { name: 'Added',     items: [
    { id: '6',     label: '6' },
    { id: 'm6',    label: 'm6' },
    { id: 'add9',  label: 'add9' },
    { id: 'madd9', label: 'madd9' },
  ]},
  { name: 'Extended',  items: [
    { id: '9',     label: '9' },
    { id: 'maj9',  label: 'maj9' },
    { id: 'm9',    label: 'm9' },
    { id: '11',    label: '11' },
    { id: 'm11',   label: 'm11' },
    { id: '13',    label: '13' },
  ]},
];

const STORAGE_KEY = 'uke-chord-state';

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    instrument: currentInstrument,
    root: selectedRoot?.name,
    quality: selectedQuality?.id,
    fullMode,
    showScore,
  }));
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

let CHORDS = {};
let selectedRoot = null;
let selectedQuality = null;
let fullMode = false;
let showScore = false;
let allQualityBtns = [];

function buildChordMap(db, instrument) {
  CHORDS = {};
  for (const root of NOTES) {
    const dbKey = instrument === 'guitar' ? (GUITAR_KEY_MAP[root] || root) : root;
    const entries = db.chords[dbKey];
    if (!entries) continue;
    for (const entry of entries) {
      const pos = entry.positions[0];
      if (!pos) continue;

      const frets = pos.frets.map(f => f === -1 ? 'x' : f).join('');
      const fingers = pos.fingers.join('');
      const position = pos.baseFret === 1 ? 0 : pos.baseFret;
      let sub = '';
      if (pos.midi) {
        let mi = 0;
        sub = pos.frets.map(f => f === -1 ? '_' : NOTES[pos.midi[mi++] % 12]).join(',');
      }

      CHORDS[root + entry.suffix] = { frets, fingers, position, sub };
    }
  }
}

const rootGrid = document.getElementById('root-grid');
const qualitySection = document.getElementById('quality-section');
const display = document.getElementById('chord-display');

function renderRoots() {
  rootGrid.innerHTML = '';
  const visibleRoots = fullMode ? ROOTS : ROOTS.filter(r => r.common);
  let selectedStillVisible = false;

  visibleRoots.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = r.label || r.name;
    if (selectedRoot && selectedRoot.name === r.name) {
      btn.classList.add('active');
      selectedStillVisible = true;
    }
    btn.addEventListener('click', () => {
      selectedRoot = r;
      rootGrid.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (!selectedQuality) {
        selectedQuality = CATEGORIES[0].items[0];
        allQualityBtns[0].classList.add('active');
      }
      updateChord();
      saveState();
    });
    rootGrid.appendChild(btn);
  });

  if (!selectedStillVisible && selectedRoot) {
    selectedRoot = visibleRoots[0];
    rootGrid.querySelector('.btn').classList.add('active');
    updateChord();
  }
}

const switchesEl = document.getElementById('switches');

function createSwitch(label, active, onChange) {
  const item = document.createElement('label');
  item.className = 'switch-item' + (active ? ' active' : '');
  item.innerHTML = `<div class="switch-track"></div><span>${label}</span>`;
  item.addEventListener('click', () => {
    const next = !item.classList.contains('active');
    item.classList.toggle('active', next);
    onChange(next);
  });
  return item;
}

const fullModeSwitch = createSwitch('All chords', fullMode, val => {
  fullMode = val;
  renderRoots();
  renderQualities();
  saveState();
});

const scoreSwitch = createSwitch('Score', showScore, val => {
  showScore = val;
  if (showScore && selectedRoot && selectedQuality) {
    renderScore(selectedRoot, selectedQuality.id);
  } else {
    document.getElementById('score-section').style.display = 'none';
  }
  saveState();
});

const guitarSwitch = createSwitch('Guitar', currentInstrument === 'guitar', val => {
  switchInstrument(val ? 'guitar' : 'ukulele');
});

switchesEl.appendChild(guitarSwitch);
switchesEl.appendChild(fullModeSwitch);
switchesEl.appendChild(scoreSwitch);

function renderQualities() {
  qualitySection.innerHTML = '';
  allQualityBtns = [];
  let selectedStillVisible = false;

  CATEGORIES.forEach(cat => {
    const visibleItems = fullMode ? cat.items : cat.items.filter(q => q.common);
    if (visibleItems.length === 0) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'category';

    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat.name;
    wrapper.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'category-grid';

    visibleItems.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = q.label;
      if (selectedQuality && selectedQuality.id === q.id) {
        btn.classList.add('active');
        selectedStillVisible = true;
      }
      btn.addEventListener('click', () => {
        selectedQuality = q;
        allQualityBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateChord();
        saveState();
      });
      grid.appendChild(btn);
      allQualityBtns.push(btn);
    });

    wrapper.appendChild(grid);
    qualitySection.appendChild(wrapper);
  });

  if (!selectedStillVisible && allQualityBtns.length > 0) {
    allQualityBtns[0].classList.add('active');
    selectedQuality = CATEGORIES.flatMap(c => fullMode ? c.items : c.items.filter(q => q.common))[0];
    if (selectedRoot) updateChord();
  }
}

// Mapping from file-based quality names to Tonal-compatible symbols
const TONAL_MAP = {
  'major': 'M', 'minor': 'm', '7': '7', 'maj7': 'maj7', 'm7': 'm7',
  'mmaj7': 'mM7', '9': '9', 'maj9': 'M9', 'm9': 'm9', '11': '11',
  'm11': 'm11', '13': '13', 'sus2': 'sus2', 'sus4': 'sus4',
  '7sus4': '7sus4', '6': '6', 'm6': 'm6', 'add9': 'add9',
  'madd9': 'madd9', 'dim': 'dim', 'dim7': 'dim7', 'aug': 'aug',
  'aug7': 'aug7', 'm7b5': 'm7b5',
};

function noteToAbc(note) {
  // note is like "C4", "Eb5", "F#4", "Bb6"
  let replaced = note.replace(/#/g, '^').replace(/b/g, '_');
  // octave 5+ → lowercase note letter
  if (/[56789]/.test(replaced)) {
    replaced = replaced.replace(/[A-G]/, m => m.toLowerCase());
  }
  // Rearrange: move note letter to end, then put accidental prefix before it
  let rearranged = replaced.substring(1) + replaced.charAt(0);
  // octave 6 → add ' for extra octave
  if (rearranged.includes('6')) rearranged += "'";
  // Remove all digits
  return rearranged.replace(/\d/g, '');
}

function renderScore(rootObj, qualityFile) {
  const scoreSection = document.getElementById('score-section');
  if (!showScore) {
    scoreSection.style.display = 'none';
    return;
  }
  const tonalQuality = TONAL_MAP[qualityFile];
  if (tonalQuality === undefined) {
    scoreSection.style.display = 'none';
    return;
  }

  const roots = rootObj.label ? rootObj.label.split('/') : [rootObj.name];

  scoreSection.innerHTML = '';
  let anyRendered = false;

  roots.forEach(root => {
    const chordSymbol = root + tonalQuality;
    const result = Tonal.Chord.get(chordSymbol);
    if (!result.tonic || result.empty) return;

    const withOctave = Tonal.Chord.getChord(result.aliases[0] || tonalQuality, result.tonic + '4');
    if (!withOctave.notes || withOctave.notes.length === 0) return;

    const abcNotes = withOctave.notes.map(noteToAbc);
    const abcSyntax = 'X:1\nK:C\n[' + abcNotes.join('8') + '8]';

    const div = document.createElement('div');
    scoreSection.appendChild(div);
    ABCJS.renderAbc(div, abcSyntax, { staffwidth: 100 });
    anyRendered = true;
  });

  scoreSection.style.display = anyRendered ? '' : 'none';
}

function updateChord() {
  if (!selectedRoot || !selectedQuality) return;
  const key = selectedRoot.name + selectedQuality.id;
  const data = CHORDS[key];
  if (!data) return;
  const rootDisplay = selectedRoot.label || selectedRoot.name;
  const chordName = selectedQuality.id === 'major' ? rootDisplay : rootDisplay + selectedQuality.label;
  display.innerHTML = `<div class="chord-name">${chordName}</div><uke-chord frets="${data.frets}" fingers="${data.fingers}" sub="${data.sub}" position="${data.position || 0}"></uke-chord>`;
  renderScore(selectedRoot, selectedQuality.id);
}

async function fetchDb(instrument) {
  if (dbCache[instrument]) return dbCache[instrument];
  const res = await fetch(CDN_URLS[instrument]);
  const db = await res.json();
  dbCache[instrument] = db;
  return db;
}

async function switchInstrument(instrument) {
  currentInstrument = instrument;
  document.title = instrument === 'guitar' ? 'Guitar Chord Finder' : 'Ukulele Chord Finder';
  const db = await fetchDb(instrument);
  buildChordMap(db, instrument);
  updateChord();
  saveState();
}

// Init
(async () => {
  try {
    const saved = loadState();

    if (saved.fullMode) {
      fullMode = true;
      fullModeSwitch.classList.add('active');
    }
    if (saved.showScore) {
      showScore = true;
      scoreSwitch.classList.add('active');
    }

    const instrument = saved.instrument || 'ukulele';
    currentInstrument = instrument;
    if (instrument === 'guitar') {
      guitarSwitch.classList.add('active');
      document.title = 'Guitar Chord Finder';
    }

    const db = await fetchDb(instrument);
    buildChordMap(db, instrument);

    const allItems = CATEGORIES.flatMap(c => c.items);
    selectedRoot = ROOTS.find(r => r.name === saved.root) || ROOTS[0];
    selectedQuality = allItems.find(q => q.id === saved.quality) || CATEGORIES[0].items[0];

    renderRoots();
    renderQualities();
    updateChord();
  } catch {
    display.innerHTML = '<span class="placeholder">Failed to load chord data</span>';
  }
})();
</script>

</body>
</html>
