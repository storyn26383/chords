<svg id="ukeChordSvg" width="98" height="134" viewBox="0 0 92 134" style="font-family: sans-serif; font-size: 11px;" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="style-scope uke-chord">
      
<text id="chordName" x="48" y="14" text-anchor="middle" style="font-size: 17px;font-family: Roboto, -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;" fill="black" class="style-scope uke-chord">D11</text>


